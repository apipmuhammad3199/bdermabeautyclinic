<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="25%" stop-color="#FCF6BA" />
      <stop offset="50%" stop-color="#B38728" />
      <stop offset="75%" stop-color="#FBF5B7" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <g filter="url(#goldGlow)">
    <!-- Crown Top Ornaments -->
    <path d="M 250 55 Q 235 90 215 105 Q 195 85 175 120 Q 210 135 250 135 Q 290 135 325 120 Q 305 85 285 105 Q 265 90 250 55 Z" fill="url(#goldGrad)" />
    <!-- Crown Jewels -->
    <circle cx="250" cy="46" r="9" fill="url(#goldGrad)" />
    <circle cx="172" cy="112" r="7" fill="url(#goldGrad)" />
    <circle cx="328" cy="112" r="7" fill="url(#goldGrad)" />
    <circle cx="210" cy="98" r="6" fill="url(#goldGrad)" />
    <circle cx="290" cy="98" r="6" fill="url(#goldGrad)" />
    <!-- Crown Base Band & Flourish -->
    <path d="M 180 138 C 210 130, 290 130, 320 138 C 312 150, 188 150, 180 138 Z" fill="url(#goldGrad)" />
    <path d="M 200 148 Q 250 165 300 148 Q 275 162 250 162 Q 225 162 200 148 Z" fill="url(#goldGrad)" />
    
    <!-- Main Circular Ring -->
    <circle cx="250" cy="290" r="125" fill="none" stroke="url(#goldGrad)" stroke-width="12" />
    <circle cx="250" cy="290" r="110" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-dasharray="8 5" />

    <!-- Bd Monogram Calligraphy -->
    <text x="245" y="332" font-family="'Playfair Display', 'Cinzel', 'Great Vibes', serif" font-weight="900" font-style="italic" font-size="135" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="-6">Bd</text>
  </g>
</svg>
